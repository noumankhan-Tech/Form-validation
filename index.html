<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Registration Form</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-decor animate-blob"></div>
    <div class="background-decor animate-blob animation-delay-2000"></div>

    <div class="form-container">
        <h2 class="form-title">Create Account</h2>
        <form id="registrationForm" novalidate>
            
            <div class="input-group" id="usernameGroup">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <i class="fa-regular fa-user input-icon"></i>
                    <input type="text" id="username" placeholder="Enter your username" autocomplete="off">
                    <i class="fa-solid fa-circle-check status-icon success"></i>
                    <i class="fa-solid fa-circle-exclamation status-icon error"></i>
                </div>
                <small class="error-text">Username must be at least 3 characters.</small>
            </div>

            <div class="input-group" id="emailGroup">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <i class="fa-regular fa-envelope input-icon"></i>
                    <input type="email" id="email" placeholder="name@example.com" autocomplete="off">
                    <i class="fa-solid fa-circle-check status-icon success"></i>
                    <i class="fa-solid fa-circle-exclamation status-icon error"></i>
                </div>
                <small class="error-text">Please provide a valid email address.</small>
            </div>

            <div class="input-group" id="passwordGroup">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" id="password" placeholder="Min. 8 characters">
                    <i class="fa-regular fa-eye-slash toggle-password" id="togglePassword"></i>
                </div>
                <small class="error-text">Password must include 8+ chars, a letter, and a number.</small>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                <span class="btn-text">Register Now</span>
                <i class="fa-solid fa-arrow-right btn-icon"></i>
            </button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
